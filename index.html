<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin: 20px 0;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 15px 0;
    }
    button {
      padding: 14px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #checkBtn {
      background: #667eea;
      color: white;
      flex: 1;
    }
    #clearBtn {
      background: #e74c3c;
      color: white;
    }
    .strength {
      font-size: 32px;
      font-weight: bold;
      margin: 25px 0;
      min-height: 50px;
    }
    .feedback {
      text-align: left;
      margin-top: 20px;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🔐 Password Strength Checker</h1>
    <p>Enter your password and click Check</p>
    
    <input type="password" id="password" placeholder="Type your password here...">
    
    <div class="buttons">
      <button id="checkBtn" onclick="checkPassword()">Check Password</button>
      <button id="clearBtn" onclick="clearPassword()">Clear</button>
    </div>
    
    <div id="strength" class="strength">—</div>
    
    <div id="feedback" class="feedback"></div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById("password").value;
      const strengthDiv = document.getElementById("strength");
      const feedbackDiv = document.getElementById("feedback");

      if (password === "") {
        strengthDiv.innerHTML = "❌ Please enter a password";
        strengthDiv.style.color = "red";
        feedbackDiv.innerHTML = "";
        return;
      }

      let score = 0;
      let feedback = [];

      if (password.length >= 12) {
        score += 2;
        feedback.push("✅ Good length (12+ characters)");
      } else if (password.length >= 8) {
        score += 1;
        feedback.push("⚠️ Acceptable length (12+ recommended)");
      } else {
        feedback.push("❌ Too short (minimum 8 characters)");
      }

      if (/[A-Z]/.test(password)) {
        score += 1;
        feedback.push("✅ Contains uppercase letter");
      } else {
        feedback.push("❌ Add uppercase letter");
      }

      if (/[a-z]/.test(password)) {
        score += 1;
        feedback.push("✅ Contains lowercase letter");
      } else {
        feedback.push("❌ Add lowercase letter");
      }

      if (/\d/.test(password)) {
        score += 1;
        feedback.push("✅ Contains number");
      } else {
        feedback.push("❌ Add a number");
      }

      if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?]/.test(password)) {
        score += 1;
        feedback.push("✅ Contains special character");
      } else {
        feedback.push("❌ Add special character");
      }

      let resultText = "";
      let color = "";

      if (score >= 6) {
        resultText = "Strong 💪";
        color = "green";
      } else if (score >= 4) {
        resultText = "Medium ⚠️";
        color = "orange";
      } else {
        resultText = "Weak ❌";
        color = "red";
      }

      strengthDiv.innerHTML = resultText;
      strengthDiv.style.color = color;

      let html = "<strong>Feedback:</strong><br>";
      feedback.forEach(item => html += `<p>${item}</p>`);
      feedbackDiv.innerHTML = html;
    }

    // New Clear Function
    function clearPassword() {
      document.getElementById("password").value = "";
      document.getElementById("strength").innerHTML = "—";
      document.getElementById("strength").style.color = "#333";
      document.getElementById("feedback").innerHTML = "";
    }
  </script>

</body>
</html>
